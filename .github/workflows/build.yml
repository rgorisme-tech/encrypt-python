name: Build Cython macOS

on: [push]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cython setuptools wheel

      - name: Compile
        run: |
          cythonize -i pyarmor_runtime.py

      - name: Upload compiled file
        uses: actions/upload-artifact@v4
        with:
          name: compiled-file
          path: "*.so"
