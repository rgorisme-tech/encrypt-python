name: Build Cython macOS

on: [push]

jobs:
  build:
    runs-on: macos-13   # better if you want Intel x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cython setuptools wheel

      - name: Verify install
        run: |
          python --version
          pip --version
          cythonize --version

      - name: Compile
        run: |
          cythonize -i script.py

      - name: Upload compiled file
        uses: actions/upload-artifact@v4
        with:
          name: compiled-file
          path: "*.so"
